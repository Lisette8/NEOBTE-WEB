

<div class="form-card" *ngIf="showForm" [formGroup]="userForm">
  <div class="form-grid">
    <input class="form-control" formControlName="email" placeholder="Email">
    <input class="form-control" formControlName="nom" placeholder="Nom">
    <input class="form-control" formControlName="prenom" placeholder="Prenom">
    <input class="form-control" formControlName="age" type="number" placeholder="Age">
    <input class="form-control" formControlName="job" placeholder="Job">
    <input class="form-control" formControlName="adresse" placeholder="Adresse">
    
    <select class="form-control" formControlName="genre">
      <option value="">Genre</option>
      <option value="HOMME">HOMME</option>
      <option value="FEMME">FEMME</option>
    </select>
  </div>
  
  <div class="form-actions">
    <button class="btn btn-save" (click)="saveUser()">
      {{ isEditMode ? 'Update User' : 'Create User' }}
    </button>
  </div>
</div>

<div class="users-card">
  <div class="users-header">
    <h2>Users Management</h2>
    <div class="tabs-container">
      <button class="tab-btn" [class.active]="currentTab === 'CLIENTS'" (click)="switchTab('CLIENTS')">Clients</button>
      <button class="tab-btn" [class.active]="currentTab === 'ADMINS'" (click)="switchTab('ADMINS')">Admins</button>
    </div>
    
  </div>

  <p class="status-msg loading" *ngIf="loading">Loading data...</p>
  <p class="status-msg error" *ngIf="error">{{ error }}</p>

  <div class="table-responsive" *ngIf="users.length > 0">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Email</th>
          <th>Nom</th>
          <th>Prenom</th>
          <th>Age</th>
          <th>Job</th>
          <th>Adresse</th>
          <th>Genre</th>
          <th>Role</th>
          <th>Solde</th>
          <th class="text-center" *ngIf="currentTab === 'CLIENTS'">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of (currentTab === 'CLIENTS' ? filteredClients : filteredAdmins)">
          <td><strong>#{{ user.idUtilisateur }}</strong></td>
          <td>{{ user.email }}</td>
          <td>{{ user.nom }}</td>
          <td>{{ user.prenom }}</td>
          <td>{{ user.age }}</td>
          <td><span class="badge">{{ user.job }}</span></td>
          <td>{{ user.adresse }}</td>
          <td>{{ user.genre }}</td>
          <td>{{ user.role }}</td>
          <td class="font-mono">{{ user.solde }}</td>
          <td class="action-cells" *ngIf="currentTab === 'CLIENTS'">
            <button class="btn btn-edit" (click)="editUser(user)">Edit</button>
            <button class="btn btn-delete" (click)="deleteUser(user.idUtilisateur)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
