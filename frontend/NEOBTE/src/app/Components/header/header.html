<header class="main-header">
  <div class="container">
    <div class="logo-section">
      <a routerLink="/" class="logo-link">
        <img src="assets/bte-logo.png" alt="BTE Logo" class="logo-img">
        <span class="logo-text">NEO <span class="bte-highlight">BTE</span></span>
      </a>
    </div>

    <nav class="main-nav" [class.open]="isMenuOpen">
      <ul>
        <li><a routerLink="/home-view" routerLinkActive="active">Accueil</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
        <li class="auth-btn-mobile" *ngIf="!isLoggedIn()">
          <a routerLink="/auth-view" class="btn-login">Connexion</a>
        </li>
      </ul>
    </nav>

    <div class="header-actions">
      <a routerLink="/auth-view" class="btn-login" *ngIf="!isLoggedIn()">Connexion</a>
      <button class="menu-toggle" (click)="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>
