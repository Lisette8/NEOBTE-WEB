<div class="panel form-panel">
  <div class="panel-header">
    <div>
      <h3>Publish Actualité</h3>
      <p class="panel-subtitle">Create a new news article for clients</p>
    </div>
  </div>
  <div class="form-grid">
    <div class="field field-full">
      <label>Title</label>
      <input class="input" type="text" placeholder="Article title..." [(ngModel)]="titre">
    </div>
    <div class="field field-full">
      <label>Content</label>
      <textarea class="input textarea" placeholder="Write your article content here..." [(ngModel)]="description"></textarea>
    </div>
  </div>
  <div class="form-footer">
    <button class="btn btn-primary" (click)="createActualite()">Publish Article</button>
  </div>
</div>

<div class="panel">
  <div class="panel-header">
    <div>
      <h3>Published Articles</h3>
      <p class="panel-subtitle">Manage existing news</p>
    </div>
    <div class="pagination-info">Page {{ page + 1 }} / {{ totalPages }}</div>
  </div>

  <div class="news-grid">
    <div class="news-card" *ngFor="let act of actualites">

      <!-- View Mode -->
      <ng-container *ngIf="editingId !== act.idActualite">
        <div class="news-card-body">
          <h4>{{ act.titre }}</h4>
          <p>{{ act.description }}</p>
        </div>
        <div class="news-card-footer">
          <span class="news-date">{{ act.dateCreationActualite | date:'MMM d, y' }}</span>
          <div class="action-group">
            <button class="btn-icon btn-edit" (click)="startEdit(act)" title="Edit">✏</button>
            <button class="btn-icon btn-delete" (click)="deleteActualite(act.idActualite)" title="Delete">🗑</button>
          </div>
        </div>
      </ng-container>

      <!-- Edit Mode -->
      <ng-container *ngIf="editingId === act.idActualite">
        <div class="edit-form">
          <input class="input" type="text" [(ngModel)]="editTitre" placeholder="Title">
          <textarea class="input textarea" [(ngModel)]="editDescription" placeholder="Content"></textarea>
          <div class="edit-actions">
            <button class="btn btn-ghost" (click)="cancelEdit()">Cancel</button>
            <button class="btn btn-primary" (click)="updateActualite(act.idActualite)">Save</button>
          </div>
        </div>
      </ng-container>

    </div>
  </div>

  <div class="empty-state" *ngIf="actualites.length === 0">
    <p>No articles published yet.</p>
  </div>

  <div class="pagination">
    <button class="btn btn-ghost" (click)="previousPage()" [disabled]="page === 0">← Previous</button>
    <span class="page-indicator">{{ page + 1 }} / {{ totalPages }}</span>
    <button class="btn btn-ghost" (click)="nextPage()" [disabled]="page === totalPages - 1">Next →</button>
  </div>
</div>
