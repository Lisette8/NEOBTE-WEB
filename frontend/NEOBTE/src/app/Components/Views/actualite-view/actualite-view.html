<h2>Actualités</h2>

<div class="news-container">

  <div class="news-card" *ngFor="let act of actualites">

    <h3>{{ act.titre }}</h3>

    <p class="date">
      {{ act.dateCreationActualite | date:'mediumDate' }}
    </p>

    <p class="description">
      {{ act.description }}
    </p>

  </div>

</div>

<div class="pagination">

  <button (click)="previousPage()" [disabled]="page === 0">
    Previous
  </button>

  <span>
    Page {{ page + 1 }} / {{ totalPages }}
  </span>

  <button (click)="nextPage()" [disabled]="page === totalPages - 1">
    Next
  </button>

</div>
