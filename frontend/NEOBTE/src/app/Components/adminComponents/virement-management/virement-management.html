<div class="panel">
  <div class="panel-header">
    <div>
      <h3>Transfers</h3>
      <p class="panel-subtitle">Monitor all transfer operations</p>
    </div>
  </div>

  <div class="status-bar loading" *ngIf="loading">
    <span class="dot"></span> Loading transfers...
  </div>

  <div class="table-wrap" *ngIf="!loading">
    <table>
      <thead>
        <tr>
          <th>Transfer ID</th>
          <th>From Account</th>
          <th>To Account</th>
          <th>Amount</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let v of virements">
          <td><span class="mono">#{{ v.idVirement }}</span></td>
          <td><span class="badge badge-blue">#{{ v.compteSourceId }}</span></td>
          <td><span class="badge badge-green">#{{ v.compteDestinationId }}</span></td>
          <td class="amount">{{ v.montant | number:'1.2-2' }} TND</td>
          <td class="muted">{{ v.dateDeVirement | date:'MMM d, y · HH:mm' }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="empty-state" *ngIf="!loading && virements.length === 0">
    <p>No transfers found.</p>
  </div>
</div>
