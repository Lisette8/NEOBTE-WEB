<header class="site-header">
  <div class="header-inner">
    <a routerLink="/home-view" class="header-brand">
      <div class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect width="18" height="18" rx="5" fill="#0000A0"/>
          <path d="M5 9h8M9 5v8" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="brand-name">NEO BTE</span>
    </a>

    <nav class="header-nav" *ngIf="isLoggedIn()">
      <a routerLink="/home-view" routerLinkActive="active" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Accueil
      </a>
      <a routerLink="/virement-view" routerLinkActive="active" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
        Virements
      </a>
      <a routerLink="/support-view" routerLinkActive="active" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Support
      </a>
      <a routerLink="/settings-view" routerLinkActive="active" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Paramètres
      </a>
    </nav>

    <div class="header-actions" *ngIf="isLoggedIn()">
      <div class="notif">
        <button class="btn-notif" type="button" (click)="toggleNotifications()" aria-label="Notifications">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
        </button>

        <div class="notif-menu" *ngIf="notifOpen">
          <div class="notif-hd">
            <p class="notif-title">Notifications</p>
            <button class="link" type="button" (click)="markAllRead()" [disabled]="unreadCount===0">Tout lire</button>
          </div>

          <div class="notif-list" *ngIf="latest.length > 0; else emptyNotifs">
            <button
              class="notif-item"
              *ngFor="let n of latest"
              type="button"
              (click)="openNotification(n)"
              [class.unread]="!n.lu"
            >
              <div class="dot" *ngIf="!n.lu"></div>
              <div class="txt">
                <p class="t">{{ n.titre }}</p>
                <p class="m">{{ n.message }}</p>
              </div>
            </button>
          </div>
          <ng-template #emptyNotifs>
            <div class="notif-empty">Aucune notification pour le moment.</div>
          </ng-template>

          <a class="notif-all" routerLink="/notifications-view" (click)="closeNotifications()">Voir tout</a>
        </div>
      </div>

      <button class="btn-logout" (click)="logout()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Déconnexion
      </button>
    </div>
  </div>
</header>
