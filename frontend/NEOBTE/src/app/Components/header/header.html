<header class="glass-header">
  <div class="header-content">
    <div class="logo-wrapper">
      <a routerLink="/" class="logo-link">
        <img src="assets/bte-logo.png" alt="BTE Logo" class="logo-img">
        <span class="logo-text">NEO <span class="accent">BTE</span></span>
      </a>
    </div>

    <nav class="nav-links" [class.open]="isMenuOpen">
      <ul>
        <li *ngIf="isLoggedIn()"><a routerLink="/home-view" routerLinkActive="active">Accueil</a></li>
        <li><a href="#">Produits</a></li>
        <li><a routerLink="/support-view" routerLinkActive="active">Support</a></li>
      </ul>
    </nav>

    <div class="header-actions">
      <div class="auth-group" *ngIf="!isLoggedIn()">
        <a routerLink="/auth-view" class="btn-login">Connexion</a>
      </div>

      <div class="auth-group" *ngIf="isLoggedIn()">
        <button class="btn-logout" (click)="logout()">Déconnexion</button>
      </div>
      
      <button class="mobile-toggle" (click)="toggleMenu()">
        <div class="hamburger" [class.active]="isMenuOpen">
          <span></span>
          <span></span>
        </div>
      </button>
    </div>
  </div>
</header>
