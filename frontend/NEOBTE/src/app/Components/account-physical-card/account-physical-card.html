<ng-container *ngIf="linkEnabled; else staticCard">
  <a class="card" [ngClass]="themeClass" [class.inactive]="compte.statutCompte !== 'ACTIVE'"
    [routerLink]="['/account', compte.idCompte]">
    <ng-container *ngTemplateOutlet="cardInner"></ng-container>
  </a>
</ng-container>

<ng-template #staticCard>
  <div class="card" [ngClass]="themeClass" [class.inactive]="compte.statutCompte !== 'ACTIVE'">
    <ng-container *ngTemplateOutlet="cardInner"></ng-container>
  </div>
</ng-template>

<ng-template #cardInner>
  <div class="shine"></div>

  <div class="top">
    <div class="brand">
      <div class="mark" aria-hidden="true">
        <img class="logo" [src]="resolvedLogoSrc" alt="NEOBTE" (error)="onLogoError()" />
      </div>
      <div class="names">
        <p class="bank">NEO BTE</p>
        <p class="type">{{ label }}</p>
      </div>
    </div>
    <div class="top-right">
      <!-- Interest badge on savings card -->
      <span class="interest-badge" *ngIf="isSavings && compte.statutCompte === 'ACTIVE'">
        +{{ interestRate }}% / an
      </span>
      <!-- Volume badge on pro card -->
      <span class="pro-badge" *ngIf="isPro && compte.statutCompte === 'ACTIVE'">
        PRO
      </span>
      <span class="status" [class.ok]="compte.statutCompte === 'ACTIVE'">{{ statusLabel }}</span>
    </div>
  </div>

  <div class="mid">
    <div class="chip" aria-hidden="true"></div>
    <div class="contactless" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="bal">
    <p class="bal-label">Solde disponible</p>
    <p class="bal-amount">{{ compte.solde | number:'1.3-3' }} <span class="cur">TND</span></p>
  </div>

  <div class="bottom">
    <p class="num">{{ maskAccountId() }}</p>
    <p class="cta" *ngIf="showCta">Ouvrir →</p>
  </div>
</ng-template>
