<header class="neo-header" (click)="$event.stopPropagation()" (document:click)="closeAll()">
  <div class="neo-header__inner">
    <a [routerLink]="isClientLoggedIn() ? '/landing-view' : '/landing-view'" class="neo-header-brand">
      <img src="assets/bte-logo.png" alt="BTE Logo" class="neo-header-brand__logo">
      <span class="neo-header-brand__text">
        <strong>NEO BTE</strong>
        <small>Banque digitale premium</small>
      </span>
    </a>
    <ng-container *ngIf="mode === 'landing'">
      <nav class="neo-header-nav">
        <div class="neo-header-dropdown">
          <button class="neo-header-link neo-header-link--button" type="button">
            Offres BTE
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round" class="neo-header-chevron">
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </button>
          <div class="neo-header-dropdown-menu">
            <a *ngFor="let s of bteServices" [href]="s.href" target="_blank" rel="noopener"
              class="neo-header-dropdown-item">
              {{ s.label }}
            </a>
          </div>
        </div>
        <a routerLink="/pricing-view" class="neo-header-link" routerLinkActive="active">Tarifs</a>
        <a routerLink="/contact" class="neo-header-link" routerLinkActive="active">Contact</a>
      </nav>
      <div class="neo-header-actions">
        <a *ngIf="isClientLoggedIn()" routerLink="/home-view" class="neo-header-btn neo-header-btn--secondary">Mon
          espace</a>
        <a *ngIf="isAdminLoggedIn()" routerLink="/admin-dashboard"
          class="neo-header-btn neo-header-btn--secondary">Panneau admin</a>
        <a *ngIf="!isLoggedIn()" routerLink="/auth-view" class="neo-header-btn neo-header-btn--primary">Se connecter</a>
      </div>
    </ng-container>
    <ng-container *ngIf="mode === 'app'">
      <nav class="neo-header-nav">
        <a routerLink="/home-view" routerLinkActive="active" class="neo-header-link">Accueil</a>
        <a routerLink="/virement-view" routerLinkActive="active" class="neo-header-link">Virements</a>
        <a routerLink="/investment-view" routerLinkActive="active" class="neo-header-link">Investissements</a>
        <a routerLink="/loan-view" routerLinkActive="active" class="neo-header-link">Prêts</a>
        <a routerLink="/actualite-view" routerLinkActive="active" class="neo-header-link">Actualités</a>
        <a routerLink="/support-view" routerLinkActive="active" class="neo-header-link">Support</a>
      </nav>
      <div class="neo-header-actions">
        <div class="notif">
          <button class="neo-header-icon-btn" type="button" (click)="toggleNotifications(); $event.stopPropagation()"
            aria-label="Notifications">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="neo-header-badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
          </button>
          <div class="neo-header-notif-menu" *ngIf="notifOpen" (click)="$event.stopPropagation()">
            <div class="neo-header-notif-head">
              <p>Notifications</p>
              <button class="neo-header-text-btn" type="button" (click)="markAllRead()"
                [disabled]="unreadCount === 0">Tout lire</button>
            </div>
            <div class="neo-header-notif-list" *ngIf="latest.length > 0; else emptyNotifs">
              <button class="neo-header-notif-item" *ngFor="let n of latest" type="button" (click)="openNotification(n)"
                [class.unread]="!n.lu">
                <div class="neo-header-dot" *ngIf="!n.lu"></div>
                <div class="neo-header-notif-copy">
                  <p class="neo-header-title">{{ n.titre }}</p>
                  <p class="neo-header-message">{{ n.message }}</p>
                </div>
              </button>
            </div>
            <ng-template #emptyNotifs>
              <div class="neo-header-empty">Aucune notification pour le moment.</div>
            </ng-template>
            <a class="neo-header-all" routerLink="/notifications-view" (click)="closeAll()">Voir toutes les
              notifications</a>
          </div>
        </div>
        <a routerLink="/settings-view" routerLinkActive="active" class="neo-header-icon-btn" aria-label="Paramètres">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </a>
        <button class="neo-header-btn neo-header-btn--logout" (click)="logout()">Déconnexion</button>
      </div>
    </ng-container>
  </div>
</header>
