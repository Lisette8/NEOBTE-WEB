<div class="chat-card">
  <div class="chat-header">
    <div class="chat-title">
      <span class="chat-badge" [class.locked]="!isPremium">
        <svg *ngIf="isPremium" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        </svg>
        <svg *ngIf="!isPremium" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        Assistant IA
      </span>
    </div>

    <a routerLink="/pricing-view" class="chat-upgrade" *ngIf="!isPremium">Voir Premium →</a>
  </div>

  <div class="locked-upsell" *ngIf="!isPremium">
    <p class="lu-title">Premium requis</p>
    <p class="lu-body">
      Débloquez l’assistant IA NeoBTE pour obtenir des réponses sur la finance, les virements et les services BTE.
    </p>
    <a routerLink="/pricing-view" class="lu-btn">Voir les offres</a>
  </div>

  <ng-container *ngIf="isPremium">
    <div class="suggestions" *ngIf="messages.length === 0">
      <p class="sug-label">Questions suggérées</p>
      <div class="sug-row">
        <button class="sug-chip" *ngFor="let q of suggestedQuestions" (click)="useSuggestion(q)">
          {{ q }}
        </button>
      </div>
    </div>

    <div class="chat-scroll" #chatScroll>
      <div class="msg" *ngFor="let m of messages" [class.user]="m.role === 'user'" [class.ai]="m.role === 'assistant'">
        <div class="bubble">{{ m.content }}</div>
      </div>
      <div class="msg ai" *ngIf="chatLoading">
        <div class="bubble typing">Écriture…</div>
      </div>
    </div>

    <p class="chat-error" *ngIf="chatError">{{ chatError }}</p>

    <div class="chat-input">
      <input
        class="chat-text"
        [(ngModel)]="inputMessage"
        (keydown.enter)="sendMessage()"
        placeholder="Posez votre question…"
      />
      <button class="chat-send" (click)="sendMessage()" [disabled]="chatLoading || !inputMessage.trim()">
        Envoyer
      </button>
    </div>
  </ng-container>
</div>
