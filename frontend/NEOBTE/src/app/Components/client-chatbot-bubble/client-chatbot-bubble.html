<div class="cbubble">

  <!-- ── Floating panel ──────────────────────────── -->
  <div class="cbubble-panel" *ngIf="open" [class.is-closing]="isClosing">

    <!-- Header -->
    <div class="cbubble-hd">
      <div class="cbubble-identity">
        <div class="cbubble-avatar">
          <i class="fa-solid fa-wand-magic-sparkles"></i>
        </div>
        <div>
          <p class="cbubble-name">NEO Assistant</p>
          <p class="cbubble-status">
            <span class="cbubble-dot" [class.cbubble-dot--on]="premium"></span>
            {{ premium ? 'Premium · En ligne' : 'Accès limité' }}
          </p>
        </div>
      </div>
      <div class="cbubble-hd-actions">
        <span class="cbubble-tier" [class.cbubble-tier--premium]="premium" [class.cbubble-tier--locked]="!premium">
          {{ premium ? '✦ Premium' : '🔒 Verrouillé' }}
        </span>
        <button class="cbubble-close" type="button" (click)="close()" aria-label="Fermer">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>

    <!-- Body -->
    <div class="cbubble-body">
      <div class="cbubble-loading" *ngIf="loading">
        <span class="cbubble-spinner"></span>
        <p>Connexion à l'assistant…</p>
      </div>
      <app-client-chatbot *ngIf="!loading" [isPremium]="premium"></app-client-chatbot>
    </div>
  </div>

  <!-- ── Trigger button ──────────────────────────── -->
  <button
    class="cbubble-btn"
    [class.cbubble-btn--open]="open"
    type="button"
    (click)="toggle()"
    aria-label="Ouvrir l'assistant IA">
    <span class="cbubble-btn-ring"></span>
    <span class="cbubble-btn-icon">
      <i class="fa-solid fa-wand-magic-sparkles" *ngIf="!open"></i>
      <i class="fa-solid fa-xmark" *ngIf="open"></i>
    </span>
  </button>

</div>
