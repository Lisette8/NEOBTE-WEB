<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo-circle">
          <img src="assets/bte-logo.png" alt="BTE Logo" class="auth-logo">
        </div>
        <h1>{{ isLoginMode ? 'Bon retour' : 'Rejoignez-nous' }}</h1>
        <p class="subtitle">{{ isLoginMode ? 'Accédez à votre compte NEO BTE' : 'Commencez votre voyage bancaire moderne' }}</p>
      </div>

      <div class="auth-body" [formGroup]="authForm">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <input id="email" type="email" formControlName="email" placeholder="nom@exemple.com">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-wrapper">
            <input id="password" type="password" formControlName="motDePasse" placeholder="••••••••">
          </div>
        </div>

        <div *ngIf="!isLoginMode" class="register-section">
          <div class="form-row">
            <div class="form-group">
              <label for="nom">Nom</label>
              <input id="nom" type="text" formControlName="nom" placeholder="Nom">
            </div>
            <div class="form-group">
              <label for="prenom">Prénom</label>
              <input id="prenom" type="text" formControlName="prenom" placeholder="Prénom">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="age">Âge</label>
              <input id="age" type="number" formControlName="age" placeholder="Âge">
            </div>
            <div class="form-group">
              <label for="genre">Genre</label>
              <select id="genre" formControlName="genre">
                <option value="">Choisir</option>
                <option value="HOMME">Homme</option>
                <option value="FEMME">Femme</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="job">Profession</label>
            <input id="job" type="text" formControlName="job" placeholder="Profession">
          </div>

          <div class="form-group">
            <label for="adresse">Adresse</label>
            <input id="adresse" type="text" formControlName="adresse" placeholder="Adresse">
          </div>
        </div>

        <button class="btn-primary" *ngIf="isLoginMode" (click)="onLogin()">
          <span>Connexion</span>
          <div class="btn-glow"></div>
        </button>
        
        <button class="btn-primary" *ngIf="!isLoginMode" (click)="onRegister()">
          <span>S'inscrire</span>
          <div class="btn-glow"></div>
        </button>

        <div class="auth-footer">
          <button class="btn-link" (click)="toggleMode()">
            {{ isLoginMode ? "Vous n'avez pas de compte ? S'inscrire" : 'Vous avez déjà un compte ? Connexion' }}
          </button>
        </div>

        <div class="messages" *ngIf="message || error">
          <p class="msg success" *ngIf="message">{{ message }}</p>
          <p class="msg error" *ngIf="error">{{ error }}</p>
        </div>
      </div>
    </div>
  </div>
  
  <div class="background-elements">
    <div class="orb blue"></div>
    <div class="orb dark"></div>
  </div>
</div>
