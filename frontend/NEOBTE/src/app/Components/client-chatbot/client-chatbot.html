<div class="chat-card">

  <!-- Locked state -->
  <div class="locked-upsell" *ngIf="!isPremium">
    <p class="lu-title">Premium requis 🔒</p>
    <p class="lu-body">
      Débloquez l'assistant IA NEO BTE pour des conseils personnalisés sur vos finances, virements et services BTE.
    </p>
    <a routerLink="/pricing-view" class="lu-btn">Découvrir Premium →</a>
  </div>

  <ng-container *ngIf="isPremium">
    <!-- Suggested questions (shown only when no messages yet) -->
    <div class="suggestions" *ngIf="messages.length === 0">
      <p class="sug-label">Suggestions</p>
      <div class="sug-row">
        <button class="sug-chip" *ngFor="let q of suggestedQuestions" (click)="useSuggestion(q)">
          {{ q }}
        </button>
      </div>
    </div>

    <!-- Message scroll area -->
    <div class="chat-scroll" #chatScroll>
      <div class="msg" *ngFor="let m of messages" [class.user]="m.role === 'user'" [class.ai]="m.role === 'assistant'">
        <div class="bubble">{{ m.content }}</div>
      </div>
      <!-- Animated typing indicator -->
      <div class="msg ai" *ngIf="chatLoading">
        <div class="typing-bubble">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      </div>
    </div>

    <!-- Error -->
    <p class="chat-error" *ngIf="chatError">{{ chatError }}</p>

    <!-- Input — always at bottom -->
    <div class="chat-input">
      <input
        class="chat-text"
        [(ngModel)]="inputMessage"
        (keydown.enter)="sendMessage()"
        placeholder="Posez votre question…"
        [disabled]="chatLoading"
      />
      <button class="chat-send" (click)="sendMessage()" [disabled]="chatLoading || !inputMessage.trim()">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </ng-container>
</div>
