<header class="site-header" (click)="$event.stopPropagation()" (document:click)="closeAll()">
  <div class="header-inner">

    <!-- BRAND — landing links to landing, app links to home -->
    <a [routerLink]="isClientLoggedIn() ? '/home-view' : '/landing-view'" class="header-brand">
      <div class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect width="18" height="18" rx="5" fill="#0000A0" />
          <path d="M5 9h8M9 5v8" stroke="white" stroke-width="2" stroke-linecap="round" />
        </svg>
      </div>
      <span class="brand-name">NEO BTE</span>
    </a>

    <!-- ══ LANDING MODE — public nav ══════════════════════════════════════ -->
    <ng-container *ngIf="mode === 'landing'">
      <nav class="header-nav">

        <!-- Services dropdown (hover) -->
        <div class="dropdown">
          <button class="nav-link dropdown-trigger" type="button">
            Services BTE
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round" class="chevron">
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </button>
          <div class="dropdown-menu">
            <a *ngFor="let s of bteServices" [href]="s.href" target="_blank" rel="noopener" class="dropdown-item">
              {{ s.label }}
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" class="ext-icon">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                <polyline points="15 3 21 3 21 9" />
                <line x1="10" y1="14" x2="21" y2="3" />
              </svg>
            </a>
          </div>
        </div>

        <a routerLink="/pricing-view" class="nav-link" routerLinkActive="active">Tarifs</a>
        <a routerLink="/contact" class="nav-link" routerLinkActive="active">Contact</a>
      </nav>

      <div class="header-actions">
        <!-- If client is logged in on landing page, show Go to App button -->
        <a *ngIf="isClientLoggedIn()" routerLink="/home-view" class="btn-go-app">
          Mon espace
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6" />
          </svg>
        </a>
        <!-- If admin is logged in on landing page, show admin panel button only -->
        <a *ngIf="isAdminLoggedIn()" routerLink="/admin-dashboard" class="btn-go-app">
          Panneau admin
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6" />
          </svg>
        </a>
        <!-- Not logged in: single Login button -->
        <a *ngIf="!isLoggedIn()" routerLink="/auth-view" class="btn-login">Se connecter</a>
      </div>
    </ng-container>

    <!-- ══ APP MODE — client authenticated nav ════════════════════════════ -->
    <ng-container *ngIf="mode === 'app'">
      <nav class="header-nav">
        <a routerLink="/home-view" routerLinkActive="active" class="nav-link">Accueil</a>
        <a routerLink="/virement-view" routerLinkActive="active" class="nav-link">Virements</a>
        <a routerLink="/actualite-view" routerLinkActive="active" class="nav-link">Actualités</a>
        <a routerLink="/support-view" routerLinkActive="active" class="nav-link">Support</a>
      </nav>

      <div class="header-actions">
        <!-- Notifications -->
        <div class="notif">
          <button class="btn-notif" type="button" (click)="toggleNotifications(); $event.stopPropagation()"
            aria-label="Notifications">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
          </button>

          <div class="notif-menu" *ngIf="notifOpen" (click)="$event.stopPropagation()">
            <div class="notif-hd">
              <p class="notif-title">Notifications</p>
              <button class="link" type="button" (click)="markAllRead()" [disabled]="unreadCount === 0">Tout
                lire</button>
            </div>
            <div class="notif-list" *ngIf="latest.length > 0; else emptyNotifs">
              <button class="notif-item" *ngFor="let n of latest" type="button" (click)="openNotification(n)"
                [class.unread]="!n.lu">
                <div class="dot" *ngIf="!n.lu"></div>
                <div class="txt">
                  <p class="t">{{ n.titre }}</p>
                  <p class="m">{{ n.message }}</p>
                </div>
              </button>
            </div>
            <ng-template #emptyNotifs>
              <div class="notif-empty">Aucune notification pour le moment.</div>
            </ng-template>
            <a class="notif-all" routerLink="/notifications-view" (click)="closeAll()">Voir tout</a>
          </div>
        </div>

        <!-- Settings -->
        <a routerLink="/settings-view" routerLinkActive="active" class="btn-settings" aria-label="Paramètres">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </a>

        <!-- Logout -->
        <button class="btn-logout" (click)="logout()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Déconnexion
        </button>
      </div>
    </ng-container>

  </div>
</header>
