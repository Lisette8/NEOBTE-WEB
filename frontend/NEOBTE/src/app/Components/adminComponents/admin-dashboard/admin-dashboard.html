<div class="admin-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <span class="brand-icon">N</span>
      </div>
      <div class="brand-text">
        <span class="brand-name">NeoBTE</span>
        <span class="brand-role">Admin Panel</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <p class="nav-section-label">Management</p>

      <button class="nav-item" [class.active]="selectedTab === 'users'" (click)="selectedTab = 'users'">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span class="nav-label">Users</span>
      </button>

      <button class="nav-item" [class.active]="selectedTab === 'comptes'" (click)="selectedTab = 'comptes'">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
        </span>
        <span class="nav-label">Accounts</span>
      </button>

      <button class="nav-item" [class.active]="selectedTab === 'virements'" (click)="selectedTab = 'virements'">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="17 1 21 5 17 9"/>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </span>
        <span class="nav-label">Transfers</span>
      </button>

      <button class="nav-item" [class.active]="selectedTab === 'support'" (click)="selectedTab = 'support'">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </span>
        <span class="nav-label">Support</span>
      </button>

      <button class="nav-item" [class.active]="selectedTab === 'news'" (click)="selectedTab = 'news'">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2z"/>
            <line x1="8" y1="6" x2="16" y2="6"/>
            <line x1="8" y1="10" x2="16" y2="10"/>
            <line x1="8" y1="14" x2="12" y2="14"/>
          </svg>
        </span>
        <span class="nav-label">Actualités</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="admin-avatar">A</div>
      <div class="admin-info">
        <span class="admin-name">Administrator</span>
        <span class="admin-status">● Online</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-main">

    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-title">
        <h1>{{ tabTitles[selectedTab] }}</h1>
        <p class="topbar-subtitle">{{ tabSubtitles[selectedTab] }}</p>
      </div>
      <div class="topbar-actions">
        <div class="topbar-date">{{ today | date: 'MMMM d, y' }}</div>
      </div>
    </div>

    <!-- View Content -->
    <div class="content-area">
      <app-user-management *ngIf="selectedTab === 'users'"></app-user-management>
      <app-compte-management *ngIf="selectedTab === 'comptes'"></app-compte-management>
      <app-virement-management *ngIf="selectedTab === 'virements'"></app-virement-management>
      <app-admin-support *ngIf="selectedTab === 'support'"></app-admin-support>
      <app-actualite-management *ngIf="selectedTab === 'news'"></app-actualite-management>
    </div>

  </main>

</div>
