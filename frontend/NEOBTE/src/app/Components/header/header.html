<!-- ══════════════════════════════════════════════════
     LANDING MODE — dark, public nav
     ══════════════════════════════════════════════════ -->
<header class="site-header" [class.header-landing]="mode === 'landing'" [class.header-app]="mode === 'app'">
  <div class="header-inner">

    <!-- Brand -->
    <a [routerLink]="isLoggedIn() ? '/home-view' : '/landing-view'" class="header-brand">
      <div class="brand-mark">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect width="18" height="18" rx="5" fill="white" fill-opacity="0.2" />
          <path d="M5 9h8M9 5v8" stroke="white" stroke-width="2" stroke-linecap="round" />
        </svg>
      </div>
      <span class="brand-name">NEO BTE</span>
    </a>

    <!-- ── LANDING NAV ── -->
    <ng-container *ngIf="mode === 'landing'">
      <nav class="landing-nav">

        <!-- Services dropdown — hover activated -->
        <div class="nav-dropdown-wrap" (mouseenter)="servicesOpen = true" (mouseleave)="servicesOpen = false">
          <button class="landing-link dropdown-trigger" [class.open]="servicesOpen">
            Services BTE
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11"
              class="chevron">
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </button>
          <div class="services-dropdown" *ngIf="servicesOpen">
            <div class="svc-grid">
              <a class="svc-item" *ngFor="let s of bteServices" [href]="s.url" target="_blank" rel="noopener">
                <div class="svc-label">{{ s.label }}</div>
                <div class="svc-desc">{{ s.desc }}</div>
              </a>
            </div>
          </div>
        </div>

        <a routerLink="/actualite-view" class="landing-link">Actualités</a>
        <a routerLink="/pricing-view" class="landing-link">Tarifs</a>
        <a routerLink="/contact" class="landing-link">Contact</a>
      </nav>

      <!-- Auth actions -->
      <div class="landing-actions">
        <ng-container *ngIf="!isLoggedIn()">
          <a routerLink="/auth-view" [queryParams]="{mode: 'login'}" class="landing-link">Connexion</a>
          <a routerLink="/auth-view" [queryParams]="{mode: 'register'}" class="btn-landing-cta">Ouvrir un compte</a>
        </ng-container>
        <ng-container *ngIf="isLoggedIn()">
          <a routerLink="/home-view" class="landing-link">Mon espace</a>
          <button class="btn-landing-outline" (click)="logout()">Déconnexion</button>
        </ng-container>
      </div>
    </ng-container>

    <!-- ── APP NAV (client) ── -->
    <ng-container *ngIf="mode === 'app' && isLoggedIn()">
      <nav class="header-nav">
        <a routerLink="/home-view" routerLinkActive="active" class="nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          Accueil
        </a>
        <a routerLink="/virement-view" routerLinkActive="active" class="nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9" />
            <path d="M3 11V9a4 4 0 0 1 4-4h14" />
            <polyline points="7 23 3 19 7 15" />
            <path d="M21 13v2a4 4 0 0 1-4 4H3" />
          </svg>
          Virements
        </a>
        <a routerLink="/actualite-view" routerLinkActive="active" class="nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2" />
          </svg>
          Actualités
        </a>
        <a routerLink="/support-view" routerLinkActive="active" class="nav-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
          Support
        </a>
      </nav>

      <div class="header-actions">
        <!-- Notifications -->
        <div class="notif">
          <button class="btn-notif" type="button" (click)="toggleNotifications()" aria-label="Notifications">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
          </button>

          <div class="notif-menu" *ngIf="notifOpen">
            <div class="notif-hd">
              <p class="notif-title">Notifications</p>
              <button class="link" type="button" (click)="markAllRead()" [disabled]="unreadCount===0">Tout lire</button>
            </div>
            <div class="notif-list" *ngIf="latest.length > 0; else emptyNotifs">
              <button class="notif-item" *ngFor="let n of latest" type="button" (click)="openNotification(n)"
                [class.unread]="!n.lu">
                <div class="dot" *ngIf="!n.lu"></div>
                <div class="txt">
                  <p class="t">{{ n.titre }}</p>
                  <p class="m">{{ n.message }}</p>
                </div>
              </button>
            </div>
            <ng-template #emptyNotifs>
              <div class="notif-empty">Aucune notification pour le moment.</div>
            </ng-template>
            <a class="notif-all" routerLink="/notifications-view" (click)="closeNotifications()">Voir tout</a>
          </div>
        </div>

        <!-- Settings avatar -->
        <a routerLink="/settings-view" class="btn-avatar" title="Paramètres">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
        </a>

        <button class="btn-logout" (click)="logout()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Déconnexion
        </button>
      </div>
    </ng-container>

  </div>
</header>
