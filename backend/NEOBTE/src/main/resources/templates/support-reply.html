<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 30px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        .reply {
            background: #eef2f7;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Support Response</h2>

    <p>Hello,</p>

    <p>Your support ticket has received a reply from our team.</p>

    <p><strong>Subject:</strong> {{subject}}</p>

    <div class="reply">
        {{reply}}
    </div>

    <p>If you need more help, feel free to open another ticket.</p>

    <div class="footer">
        This is an automated message from the support system.
    </div>

</div>

</body>
</html>
